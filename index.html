<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://envvalidator.com/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const savedTheme = window.localStorage.getItem('env-validator-theme');
          const theme =
            savedTheme === 'dark' || savedTheme === 'light'
              ? savedTheme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
    <meta
      name="description"
      content="Validate, compare, and diff .env files in the browser. Check .env.local, .env.dev, .env.qa, and .env.prod against your .env.example template to find missing keys, extra keys, duplicates, and malformed lines."
    />
    <meta
      property="og:title"
      content=".env File Validator & Compare Tool - Diff .env Against .env.example"
    />
    <meta
      property="og:description"
      content="Validate, compare, and diff .env files in the browser. Check .env.local, .env.dev, .env.qa, and .env.prod against your .env.example template to find missing keys, extra keys, duplicates, and malformed lines."
    />

    <meta property="og:url" content="https://envvalidator.com/" />
    <meta property="og:image" content="https://envvalidator.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta

    />
    <meta name="twitter:image" content="https://envvalidator.com/og-image.png" />
    <title>.env File Validator & Compare Tool - Diff .env Against .env.example</title>
